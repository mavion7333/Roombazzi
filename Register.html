<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Sora:wght@100..800&display=swap" rel="stylesheet">

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Sora:wght@100..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="roombazzi.css">
    <title>Register.com</title>
</head>

<body>
    <div id="wrapper">
        <div class="logo">
            <img src="roombazzi logo.png" alt="">
        </div>
        <div class="login-form register-form">
            <h2>Create an Account</h2>
            <form action="submit_register.php" method="POST">
                <label for="name">Full Name</label><br>
                <input type="text" id="name" name="name" placeholder="John Doe"><br><br>

                <label for="gender">Gender</label><br>
                <select id="gender" name="gender">
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                    <option value="prefer-not-to-say">Prefer not to say</option>
                </select>
                <br><br>

                <label for="phone">Phone Number</label><br>
                <input type="tel" id="phone" name="phone" placeholder="10-digit number"><br><br>

                <label for="email">Email Address</label><br>
                <input type="email" id="email" name="email" placeholder="your@email.com"><br><br>

                <label for="password">Password</label><br>
                <input type="password" id="password" name="password" required placeholder="Min 8 char, upper, lower, number, special"><br><br>

                <label for="confirm_password">Confirm Password</label><br>
                <input type="password" id="confirm_password" name="confirm_password" required placeholder="Re-enter your password"><br><br>

                <div class="create-account"><button type="submit">Create Account</button><br></div>

                <hr>

                <div class="para">
                    <p>Already have an account? <a href="Login.html">Log In</a></p>
                </div>
            </form>
        </div>
    </div>
</body>

</html>
