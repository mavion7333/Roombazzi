    <title>Forget Password</title>
</head>
<body>
    <div id="wrapper">
        <div class="logo">
            <img src="roombazzi logo.png" alt="">
        </div>
        <div class="login-form forgot-password">
            <h2>Reset Password</h2>
            <form action="submit_forgot_password.php" method="POST">

                <label for="email">Email Address</label><br>
                <input type="email" id="email" name="email" placeholder="your@email.com"><br><br>

                <label for="otp">OTP Code</label><br>
                <input type="text" id="otp" name="otp" placeholder="Enter the OTP"><br><br>

                <label for="new_password">New Password</label><br>
                <input type="password" id="new_password" name="new_password" required placeholder="Enter your new password"><br><br>

                <label for="confirm_new_password">Confirm New Password</label><br>
                <input type="password" id="confirm_new_password" name="confirm_new_password" required placeholder="Re-enter your new password"><br><br>

                <button type="submit">Reset Password</button><br>

                <p>Need new OTP? <a href="">Send again</a></p>

                <p class="login"><a href="/Login.html">Back to Login</a></p>

            </form>
        </div>

    </div>
</body>
</html>
